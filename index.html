<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HamiVideo 影片庫</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --netflix-red: #E50914;
      --bg-dark: #141414;
      --bg-card: #1a1a1a;
      --bg-nav: rgba(20,20,20,0.95);
      --text-primary: #ffffff;
      --text-secondary: #b3b3b3;
      --text-muted: #6b6b6b;
      --border-color: #333;
      --tag-bg: rgba(229,9,20,0.15);
      --tag-border: rgba(229,9,20,0.4);
    }

    body {
      font-family: 'Helvetica Neue', Arial, 'PingFang TC', 'Microsoft JhengHei', sans-serif;
      background: var(--bg-dark);
      color: var(--text-primary);
      min-height: 100vh;
    }

    /* NAV */
    nav {
      position: sticky; top: 0; z-index: 1000;
      background: var(--bg-nav);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border-color);
      padding: 0 32px; height: 64px;
      display: flex; align-items: center; gap: 24px;
    }
    .nav-logo { font-size: 28px; font-weight: 900; color: var(--netflix-red); letter-spacing: -1px; white-space: nowrap; }
    .nav-logo span { color: var(--text-primary); font-weight: 400; font-size: 18px; margin-left: 6px; }
    .nav-search { flex: 1; max-width: 400px; position: relative; }
    .nav-search input {
      width: 100%; padding: 10px 16px 10px 42px;
      background: rgba(255,255,255,0.08);
      border: 1px solid var(--border-color); border-radius: 6px;
      color: var(--text-primary); font-size: 14px; outline: none; transition: all 0.2s;
    }
    .nav-search input:focus { background: rgba(255,255,255,0.12); border-color: #666; }
    .nav-search input::placeholder { color: var(--text-muted); }
    .nav-search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 16px; }
    .nav-stats { margin-left: auto; font-size: 13px; color: var(--text-muted); white-space: nowrap; }
    .nav-stats strong { color: var(--netflix-red); }

    /* HERO */
    .hero { position: relative; height: 420px; overflow: hidden; }
    .hero-bg { position: absolute; inset: 0; background: linear-gradient(135deg, #1a0000 0%, #141414 50%, #000820 100%); }
    .hero-gradient { position: absolute; inset: 0; background: linear-gradient(to bottom, transparent 30%, var(--bg-dark) 100%); z-index: 2; }
    .hero-content { position: relative; z-index: 3; padding: 60px 48px; max-width: 600px; }
    .hero-badge { display: inline-block; background: var(--netflix-red); color: white; font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 3px; letter-spacing: 1px; margin-bottom: 16px; text-transform: uppercase; }
    .hero-title { font-size: 48px; font-weight: 900; line-height: 1.1; margin-bottom: 16px; text-shadow: 2px 2px 8px rgba(0,0,0,0.8); }
    .hero-views { color: #46d369; font-weight: 700; font-size: 14px; margin-bottom: 12px; }
    .hero-desc { font-size: 15px; line-height: 1.6; color: var(--text-secondary); display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 20px; }
    .hero-tags { display: flex; flex-wrap: wrap; gap: 8px; }
    .hero-tag { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); padding: 4px 12px; border-radius: 20px; font-size: 12px; color: var(--text-secondary); }

    /* FILTERS */
    .filters-section {
      background: rgba(0,0,0,0.3);
      border-bottom: 1px solid var(--border-color);
      padding: 16px 32px;
      display: flex; flex-wrap: wrap; gap: 12px; align-items: center;
    }
    .filter-label { font-size: 12px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; }
    .filter-scroll { display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; flex: 1; }
    .filter-scroll::-webkit-scrollbar { display: none; }
    .filter-btn {
      padding: 6px 16px; border: 1px solid var(--border-color); border-radius: 20px;
      background: transparent; color: var(--text-secondary); font-size: 13px;
      cursor: pointer; white-space: nowrap; transition: all 0.2s; font-family: inherit;
    }
    .filter-btn:hover { border-color: #888; color: white; }
    .filter-btn.active { background: var(--netflix-red); border-color: var(--netflix-red); color: white; font-weight: 600; }
    .filter-row { width: 100%; display: flex; align-items: center; gap: 12px; }
    .filter-separator { width: 1px; height: 24px; background: var(--border-color); }
    .sort-select {
      padding: 6px 12px; background: rgba(255,255,255,0.08);
      border: 1px solid var(--border-color); border-radius: 6px;
      color: var(--text-primary); font-size: 13px; cursor: pointer; outline: none; font-family: inherit;
    }
    .sort-select option { background: #222; }

    /* CONTENT */
    .content-area { padding: 24px 32px; }
    .section-title { font-size: 20px; font-weight: 700; margin-bottom: 20px; display: flex; align-items: center; gap: 12px; }
    .section-title .count { font-size: 14px; color: var(--text-muted); font-weight: 400; }

    /* GRID */
    .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; }

    /* CARD */
    .card { border-radius: 8px; overflow: hidden; background: var(--bg-card); cursor: pointer; transition: transform 0.25s, box-shadow 0.25s; position: relative; }
    .card:hover { transform: scale(1.04) translateY(-4px); box-shadow: 0 16px 40px rgba(0,0,0,0.7); z-index: 10; }
    .card-poster { width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block; background: #222; }
    .card-poster-placeholder { width: 100%; aspect-ratio: 2/3; background: linear-gradient(135deg, #1e1e2e, #2a1a2e); display: flex; align-items: center; justify-content: center; font-size: 32px; }
    .card-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.3) 50%, transparent 100%); opacity: 0; transition: opacity 0.25s; display: flex; flex-direction: column; justify-content: flex-end; padding: 16px; }
    .card:hover .card-overlay { opacity: 1; }
    .card-overlay-title { font-size: 14px; font-weight: 700; margin-bottom: 6px; line-height: 1.3; }
    .card-overlay-desc { font-size: 11px; color: var(--text-secondary); display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.5; margin-bottom: 8px; }
    .card-overlay-tags { display: flex; flex-wrap: wrap; gap: 4px; }
    .card-overlay-tag { font-size: 10px; padding: 2px 8px; border-radius: 10px; background: var(--tag-bg); border: 1px solid var(--tag-border); color: #ff6b6b; }
    .card-info { padding: 10px 12px; }
    .card-title { font-size: 13px; font-weight: 600; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-meta { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--text-muted); }
    .card-views { color: #46d369; font-weight: 600; }
    .card-rank { position: absolute; top: 8px; left: 8px; background: rgba(229,9,20,0.9); color: white; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 4px; }

    /* MODAL */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 20px; opacity: 0; pointer-events: none; transition: opacity 0.25s; }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal { background: #1a1a1a; border-radius: 12px; max-width: 760px; width: 100%; max-height: 90vh; overflow-y: auto; border: 1px solid #333; box-shadow: 0 24px 80px rgba(0,0,0,0.8); transform: scale(0.95); transition: transform 0.25s; }
    .modal-overlay.open .modal { transform: scale(1); }
    .modal::-webkit-scrollbar { width: 6px; }
    .modal::-webkit-scrollbar-track { background: #1a1a1a; }
    .modal::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }
    .modal-header { position: relative; height: 300px; overflow: hidden; border-radius: 12px 12px 0 0; }
    .modal-header-img { width: 100%; height: 100%; object-fit: cover; object-position: top; }
    .modal-header-gradient { position: absolute; inset: 0; background: linear-gradient(to bottom, transparent 30%, #1a1a1a 100%); }
    .modal-header-title { position: absolute; bottom: 20px; left: 24px; right: 60px; font-size: 30px; font-weight: 900; text-shadow: 2px 2px 8px rgba(0,0,0,0.9); }
    .modal-close { position: absolute; top: 16px; right: 16px; width: 36px; height: 36px; background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.2); border-radius: 50%; color: white; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 10; transition: background 0.2s; }
    .modal-close:hover { background: rgba(229,9,20,0.7); }
    .modal-body { padding: 8px 24px 28px; }
    .modal-views { color: #46d369; font-size: 13px; font-weight: 700; margin-bottom: 12px; }
    .modal-desc { font-size: 15px; line-height: 1.8; color: var(--text-secondary); margin-bottom: 24px; }
    .modal-section { margin-bottom: 20px; }
    .modal-section-title { font-size: 12px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
    .modal-tags { display: flex; flex-wrap: wrap; gap: 8px; }
    .modal-tag-genre { padding: 5px 14px; border-radius: 20px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); font-size: 13px; color: var(--text-secondary); }
    .modal-tag-mood { padding: 5px 14px; border-radius: 20px; background: var(--tag-bg); border: 1px solid var(--tag-border); font-size: 13px; color: #ff8080; }
    .modal-videoid { font-size: 12px; color: var(--text-muted); margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border-color); }

    /* LOADING */
    .loading { text-align: center; padding: 100px 20px; color: var(--text-muted); font-size: 18px; }

    /* NO RESULTS */
    .no-results { text-align: center; padding: 80px 20px; color: var(--text-muted); }
    .no-results-icon { font-size: 48px; margin-bottom: 16px; }
    .no-results h3 { font-size: 20px; margin-bottom: 8px; color: var(--text-secondary); }

    /* FOOTER */
    footer { text-align: center; padding: 32px; color: var(--text-muted); font-size: 12px; border-top: 1px solid var(--border-color); margin-top: 40px; }
    footer a { color: var(--netflix-red); text-decoration: none; }

    /* SCROLLBAR */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg-dark); }
    ::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #666; }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      nav { padding: 0 16px; gap: 12px; }
      .nav-stats { display: none; }
      .hero { height: 320px; }
      .hero-content { padding: 40px 20px; }
      .hero-title { font-size: 32px; }
      .filters-section { padding: 12px 16px; }
      .content-area { padding: 16px; }
      .card-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
      .modal-header { height: 200px; }
      .modal-header-title { font-size: 22px; }
    }
  </style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-logo">HAMI<span>VIDEO</span></div>
  <div class="nav-search">
    <span class="nav-search-icon">&#128269;</span>
    <input type="text" id="searchInput" placeholder="搜尋片名、演員、關鍵字…" autocomplete="off">
  </div>
  <div class="nav-stats">共 <strong id="totalCount">-</strong> 部影片 &nbsp;|&nbsp; 顯示 <strong id="showCount">-</strong> 部</div>
</nav>

<!-- HERO -->
<div class="hero" id="heroSection">
  <div class="hero-bg"></div>
  <div class="hero-gradient"></div>
  <div class="hero-content" id="heroContent"><div class="loading">載入中…</div></div>
</div>

<!-- FILTERS -->
<div class="filters-section">
  <div class="filter-row">
    <span class="filter-label">排序</span>
    <select class="sort-select" id="sortSelect">
      <option value="views">觀看數排序</option>
      <option value="title">片名 A-Z</option>
    </select>
    <div class="filter-separator"></div>
    <span class="filter-label">國家</span>
    <div class="filter-scroll" id="countryFilters"></div>
  </div>
  <div class="filter-row">
    <span class="filter-label">情緒</span>
    <div class="filter-scroll" id="moodFilters"></div>
  </div>
</div>

<!-- CONTENT -->
<div class="content-area">
  <div class="section-title">
    <span id="sectionLabel">全部影片</span>
    <span class="count" id="sectionCount"></span>
  </div>
  <div class="card-grid" id="cardGrid"></div>
  <div class="no-results" id="noResults" style="display:none">
    <div class="no-results-icon">&#127916;</div>
    <h3>找不到符合的影片</h3>
    <p>請嘗試其他搜尋條件</p>
  </div>
</div>

<!-- FOOTER -->
<footer>
  HamiVideo 影片庫 &nbsp;|&nbsp; 資料來源：<a href="#">HamiVideo</a> &nbsp;|&nbsp; 分類參考：Netflix
</footer>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modal">
    <div class="modal-header" id="modalHeader">
      <button class="modal-close" id="modalCloseBtn">&#10005;</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script src="hamivideo.js"></script>
</body>
</html>
